# FALLBACK — solo para cuando Vercel está en Hobby (cron limitado a 1/día).
# Actualmente los crones corren nativos en Vercel Pro (ver vercel.json).
# Si se cancela el plan Pro:
#   1. Borrar vercel.json
#   2. Descomentar el bloque `schedule:` abajo
#   3. Configurar secrets VERCEL_APP_URL + CRON_SECRET en el repo
#
# Mientras tanto el workflow solo corre manual desde la UI (workflow_dispatch).
name: External Crons (Hobby fallback — disabled)

on:
  # schedule:
  #   - cron: "*/5 * * * *"   # reconcile-payments-hot (degradado desde */2)
  #   - cron: "*/15 * * * *"  # reconcile-zombie + expire-sessions
  workflow_dispatch: # disparo manual desde UI

jobs:
  reconcile-hot:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Hit reconcile-payments-hot
        run: |
          curl -fsS "$VERCEL_APP_URL/api/cron/reconcile-payments-hot" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60 | tee /dev/stderr
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  reconcile-zombie:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Hit reconcile-payments-zombie
        run: |
          curl -fsS "$VERCEL_APP_URL/api/cron/reconcile-payments-zombie" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60 | tee /dev/stderr
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  expire-sessions:
    if: github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Hit expire-sessions
        run: |
          curl -fsS "$VERCEL_APP_URL/api/cron/expire-sessions" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60 | tee /dev/stderr
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
